<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a0b2e;stop-opacity:1" />
        </radialGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <!-- Background Circle -->
    <circle cx="20" cy="20" r="18" fill="url(#grad1)" stroke="#8A2BE2" stroke-width="1"/>

    <!-- AI Neural Network / Git Graph -->
    <g stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
        <!-- Main Lines -->
        <!-- Center Git-like branch -->
        <path d="M14 28 C 14 20, 26 20, 26 12" stroke="#00FF7F" stroke-width="2"/>
        <path d="M14 12 L 14 28" stroke="#00BFFF" stroke-width="2"/>
        
        <!-- Radiating AI Connections -->
        <path d="M26 22 L 32 26" stroke="#DA70D6" stroke-width="1.5"/>
        <path d="M14 16 L 8 14" stroke="#DA70D6" stroke-width="1.5"/>
        <path d="M20 12 L 24 8" stroke="#00FF7F" stroke-width="1.5"/>
    </g>

    <!-- Nodes -->
    <g fill="#FFFFFF">
        <!-- Main Nodes -->
        <circle cx="14" cy="28" r="2.5" fill="#00BFFF"/>
        <circle cx="26" cy="12" r="2.5" fill="#00FF7F"/>
        <circle cx="14" cy="12" r="2" fill="#00BFFF"/>
        
        <!-- Satellite Nodes -->
        <circle cx="32" cy="26" r="1.5" fill="#DA70D6"/>
        <circle cx="8" cy="14" r="1.5" fill="#DA70D6"/>
        <circle cx="24" cy="8" r="1.5" fill="#00FF7F"/>
    </g>
    
    <!-- Sparkle -->
    <path d="M30 8 L31 10 L33 11 L31 12 L30 14 L29 12 L27 11 L29 10 Z" fill="#FFFF00"/>
</svg>
